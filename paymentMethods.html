<!DOCTYPE html>
<html>
<head>
    <title>Payment Methods - Phethelo Molapo Foundation</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{ font-family: Arial,sans-serif; background-color: #f4f4f4; margin:0; padding:0;}
        header{ background-color:#1f2d3d; color:white; text-align:center; padding:20px;}
        .container{ max-width:900px; margin:40px auto; padding:20px;}
        .payment-box{ background:white; padding:30px; border-radius:12px; box-shadow:0 0 15px rgba(0,0,0,0.1);}
        h2{text-align:center; color:#1f2d3d; margin-bottom:30px;}
        .method-buttons{text-align:center; margin-bottom:30px;}
        .btn{ display:inline-block; margin:10px; padding:14px 24px; background-color:#27ae60; color:white; text-decoration:none; border-radius:6px; font-weight:bold; border:none; cursor:pointer;}
        .btn:hover{ background-color:#219150;}
        .payment-section{ display:none; margin-top:20px; padding:20px; border:1px solid #ddd; border-radius:10px; background-color:#fafafa;}
        input, select, textarea{ width:100%; padding:12px; margin:10px 0 20px 0; border:1px solid #ccc; border-radius:6px;}
        label{ font-weight:bold; color:#333;}
        .bank-details{ background-color:#ecf0f1; padding:20px; border-radius:8px; line-height:1.8;}
        .back-link{ display:block; text-align:center; margin-top:25px; color:#27ae60; text-decoration:none; font-weight:bold;}
        .back-link:hover{ text-decoration:underline;}
    </style>
</head>
<body>

<header>
    <h1>Phethelo Molapo Foundation</h1>
    <p>Select a payment method to donate</p>
</header>

<div class="container">
    <div class="payment-box">
        <h2>Payment Method</h2>

        <div class="method-buttons">
            <button class="btn" onclick="showSection('eft')">EFT / Bank Transfer</button>        
        </div>

        <!-- EFT Section -->
        <div id="eft" class="payment-section">
            <h3>EFT / Bank Transfer</h3>
            <div class="bank-details">
                <p><strong>Bank Name:</strong> FNB</p>
                <p><strong>Account Name:</strong> Phethelo Molapo Foundation</p>
                <p><strong>Account Number:</strong> 62738192018</p>
                <p><strong>Branch Code:</strong> 250655</p>
                <p><strong>Reference:</strong> Your Name + Donation</p>
            </div>

            <form action="PaymentServlet" method="post" enctype="multipart/form-data">
                <input type="hidden" name="method" value="EFT">

                <label for="eftName">Your Full Name</label>
                <input type="text" id="eftName" name="name" placeholder="Enter your full name" required>

                <label for="eftAmount">Donation Amount (R)</label>
                <input type="number" id="eftAmount" name="amount" placeholder="Enter amount" required min="1">

                <label for="eftProof">Upload Proof of Payment</label>
                <input type="file" id="eftProof" name="proof" accept=".jpg,.png,.pdf">

                <button type="submit" class="btn">Submit EFT Donation</button>
            </form>
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>
</div>

<script>
function showSection(sectionId) {
    let sections = document.querySelectorAll('.payment-section');
    sections.forEach(section => section.style.display = 'none');
    document.getElementById(sectionId).style.display = 'block';
}
</script>
</body>
</html>
