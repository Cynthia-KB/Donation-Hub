<!DOCTYPE html>
<html>
<head>
    <title>Donate Items - Phethelo Molapo Foundation</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header{
            background-color: #1f2d3d;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container{
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        .donate-box{
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align: center;
            color: #1f2d3d;
            margin-bottom: 25px;
        }

        label{
            font-weight: bold;
            color: #333;
        }

        input, select, textarea{
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        textarea{
            resize: vertical;
        }

        .btn{
            display: inline-block;
            width: 100%;
            padding: 14px;
            background-color: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn:hover{
            background-color: #219150;
        }

        .back-link{
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #27ae60;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover{
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1>Phethelo Molapo Foundation</h1>
        <p>Donate school and household items to help children in need</p>
    </header>

    <div class="container">
        <div class="donate-box">
            <h2>Donate Material Items</h2>

            <form action="DonateItemsServlet" method="post">
    <label for="donorName">Full Name</label>
    <input type="text" id="donorName" name="donorName" placeholder="Enter your full name" required>

    <label for="itemType">Type of Item</label>
    <select id="itemType" name="itemType" required>
        <option value="">Select Item Type</option>
        <option value="School Shoes">School Shoes</option>
        <option value="School Uniform">School Uniform</option>
        <option value="Books">Books</option>
        <option value="Stationery">Stationery</option>
        <option value="Food Parcel">Food Parcel</option>
        <option value="Clothing">Clothing</option>
        <option value="Blankets">Blankets</option>
        <option value="Toiletries">Toiletries</option>
        <option value="Other">Other</option>
    </select>

    <label for="quantity">Quantity</label>
    <input type="number" id="quantity" name="quantity" placeholder="Enter quantity" required>

    <label for="description">Item Description</label>
    <textarea id="description" name="description" rows="4" placeholder="Describe the item(s) you want to donate"></textarea>

    <label for="deliveryMethod">How will you donate?</label>
    <select id="deliveryMethod" name="deliveryMethod" required>
        <option value="">Select Option</option>
        <option value="Drop Off">I will drop off the items</option>
        <option value="Collection">Please collect the items</option>
    </select>

    <label for="donationDate">Preferred Donation Date</label>
    <input type="date" id="donationDate" name="donationDate" required>

    <button type="submit" class="btn">Submit Item Donation</button>
</form>
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script>
        function submitItemDonation(event) {
            event.preventDefault();

            alert("Thank you! Your item donation has been submitted successfully.");
            window.location.href = "DashboardServlet";
        }
    </script>

</body>
</html>
