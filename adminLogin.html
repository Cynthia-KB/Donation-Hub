<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { font-family: Arial; text-align:center; padding:50px; background:#f4f4f4; }
        .login-box { background:white; padding:30px; border-radius:12px; display:inline-block; box-shadow:0 0 15px rgba(0,0,0,0.1); }
        input { width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:6px; }
        button { padding:10px 20px; background:#27ae60; color:white; border:none; border-radius:6px; cursor:pointer; }
        button:hover { background:#219150; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Login</h2>
        <form action="AdminLoginServlet" method="post">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
